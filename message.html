<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TalkNest · live whispers</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        background: radial-gradient(circle at 20% 30%, #0b0e17, #020308);
        color: #eef2ff;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    /* import font */
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap');

    /* modern top bar */
    #topBar {
        background: rgba(18, 22, 40, 0.85);
        backdrop-filter: blur(16px);
        padding: 14px 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(79, 125, 243, 0.3);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
    }

    .room-badge {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(0, 0, 0, 0.4);
        padding: 6px 14px;
        border-radius: 60px;
        backdrop-filter: blur(4px);
    }

    .room-badge span:first-child {
        font-weight: 600;
        color: #9bbaff;
        letter-spacing: 0.3px;
    }

    .room-badge span:last-child {
        font-weight: 500;
        background: #2a3a6e;
        padding: 4px 10px;
        border-radius: 30px;
        font-size: 0.8rem;
    }

    #deleteRoom {
        background: rgba(255, 70, 85, 0.2);
        border: 1px solid rgba(255, 90, 100, 0.5);
        color: #ff9e9e;
        padding: 8px 20px;
        border-radius: 40px;
        font-weight: 500;
        font-size: 0.85rem;
        cursor: pointer;
        transition: 0.2s;
        backdrop-filter: blur(8px);
    }

    #deleteRoom:hover {
        background: rgba(255, 70, 85, 0.55);
        color: white;
        border-color: #ff6b7c;
        transform: scale(0.96);
    }

    /* messages container - modern bubbles */
    #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scroll-behavior: smooth;
    }

    /* custom scroll */
    #messages::-webkit-scrollbar {
        width: 5px;
    }
    #messages::-webkit-scrollbar-track {
        background: #1a1e2c;
        border-radius: 10px;
    }
    #messages::-webkit-scrollbar-thumb {
        background: #4f7df3;
        border-radius: 10px;
    }

    .msg-wrapper {
        display: flex;
        width: 100%;
        margin-bottom: 6px;
    }

    .msg {
        max-width: 72%;
        padding: 10px 14px;
        border-radius: 22px;
        position: relative;
        word-wrap: break-word;
        box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        transition: 0.1s;
        line-height: 1.4;
    }

    /* left message (others) */
    .left-msg {
        background: #262c42;
        border-bottom-left-radius: 5px;
        color: #f0f3ff;
        align-self: flex-start;
        border: 0.5px solid #3e4668;
    }

    /* right message (current user) */
    .right-msg {
        background: linear-gradient(115deg, #2b4cce, #1f3a94);
        color: white;
        border-bottom-right-radius: 5px;
        margin-left: auto;
        text-align: right;
        box-shadow: 0 3px 10px rgba(33, 88, 243, 0.3);
    }

    .msg-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 5px;
        font-size: 0.75rem;
        flex-wrap: wrap;
    }

    .sender-name {
        font-weight: 600;
        opacity: 0.85;
        letter-spacing: -0.2px;
        font-size: 0.8rem;
    }

    .left-msg .sender-name {
        color: #b7cdff;
    }
    .right-msg .sender-name {
        color: #d9e6ff;
    }

    .timestamp {
        font-size: 0.65rem;
        opacity: 0.7;
        font-family: monospace;
    }

    .msg-text {
        font-size: 0.95rem;
        font-weight: 450;
        word-break: break-word;
        margin: 4px 0 2px;
    }

    .receipt-status {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 4px;
        margin-top: 4px;
        font-size: 0.7rem;
        letter-spacing: -0.5px;
    }

    .receipt-status span {
        margin-left: 6px;
        font-size: 0.8rem;
    }

    .double-tick {
        color: #9bd7ff;
        font-weight: 500;
    }

    /* input area */
    #inputArea {
        display: flex;
        gap: 12px;
        padding: 14px 20px;
        background: rgba(12, 15, 28, 0.85);
        backdrop-filter: blur(16px);
        border-top: 1px solid #2c3150;
        align-items: center;
    }

    #messageInput {
        flex: 1;
        background: #141a2c;
        border: 1px solid #37415e;
        border-radius: 44px;
        padding: 12px 20px;
        font-size: 0.95rem;
        color: white;
        font-family: inherit;
        outline: none;
        transition: all 0.2s;
    }

    #messageInput:focus {
        border-color: #4f7df3;
        box-shadow: 0 0 0 3px rgba(79, 125, 243, 0.2);
        background: #0c1122;
    }

    #sendBtn {
        background: linear-gradient(105deg, #4f7df3, #365fcf);
        border: none;
        border-radius: 44px;
        padding: 0 26px;
        height: 46px;
        font-weight: 600;
        font-size: 0.9rem;
        color: white;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 2px 10px rgba(0, 100, 255, 0.3);
    }

    #sendBtn:hover {
        transform: scale(0.96);
        background: linear-gradient(105deg, #638cfb, #4870e0);
    }

    .small-note {
        font-size: 0.7rem;
        text-align: center;
        padding: 4px;
        background: #00000030;
        color: #8b9bcf;
    }

    @media (max-width: 600px) {
        .msg { max-width: 85%; }
        #topBar { padding: 10px 14px; }
        .room-badge span:first-child { font-size: 0.8rem; }
        .room-badge span:last-child { font-size: 0.7rem; }
    }
</style>
</head>
<body>

<div id="topBar">
    <div class="room-badge">
        <span>🏠 nest</span>
        <span id="roomInfo">—</span>
        <span>👤 <span id="userInfo">—</span></span>
    </div>
    <button id="deleteRoom">🗑 dissolve room</button>
</div>

<div id="messages"></div>

<div id="inputArea">
    <input id="messageInput" placeholder="Type your message..." autocomplete="off">
    <button id="sendBtn">➤ Send</button>
</div>
<div class="small-note">✔️ seen receipts: double check when others view your message</div>

<script type="module">
    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, set, ref, push, onValue, remove, update, get, child, onChildAdded, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAbWxvnQYU3APJ4jLuD-mqErVaWkvm7_uY",
        authDomain: "talknest-ce517.firebaseapp.com",
        projectId: "talknest-ce517",
        storageBucket: "talknest-ce517.firebasestorage.app",
        messagingSenderId: "662966226921",
        appId: "1:662966226921:web:195bcf44b7e40252e54578"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ==========================
    // SESSION VALIDATION
    // ==========================
    const isJoined = localStorage.getItem("IsJoined");
    const roomId = localStorage.getItem("roomId");
    const userName = localStorage.getItem("userName");

    if (isJoined !== "true" || !roomId || !userName) {
        window.location.href = "index.html";
    }

    // ==========================
    // REFERENCES
    // ==========================
    const messagesRef = ref(db, `TalkNest/${roomId}/messages`);
    const roomMetaRef = ref(db, `TalkNest/${roomId}`);

    // UI elements
    const messagesDiv = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    document.getElementById("roomInfo").innerText = roomId;
    document.getElementById("userInfo").innerText = userName;

    // store seen updates to avoid re-trigger loops
    let processedMsgIds = new Set();

    // ==========================
    // FORMAT TIMESTAMP
    // ==========================
    function formatTime(timestamp) {
        if (!timestamp) return "";
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    // ==========================
    // UPDATE SEEN STATUS (when a message is visible to current user)
    // For each message that is NOT from me and seen === false -> mark as seen = true
    // ==========================
    async function markMessagesAsSeen() {
        if (!roomId) return;
        const allMsgsRef = ref(db, `TalkNest/${roomId}/messages`);
        const snapshot = await get(allMsgsRef);
        if (!snapshot.exists()) return;
        
        const messages = snapshot.val();
        const updates = {};
        
        for (const [msgId, msgData] of Object.entries(messages)) {
            // if message is from OTHER person and seen flag is false or undefined
            if (msgData.from !== userName && (msgData.seen === false || msgData.seen === undefined)) {
                updates[`TalkNest/${roomId}/messages/${msgId}/seen`] = true;
            }
        }
        
        if (Object.keys(updates).length > 0) {
            await update(ref(db), updates);
        }
    }

    // ==========================
    // RENDER MESSAGES (with seen indicator & timestamp)
    // ==========================
    function renderMessages(snapshot) {
        if (!snapshot.exists()) {
            messagesDiv.innerHTML = '<div style="text-align:center;opacity:0.5;margin-top:2rem;">✨ no messages yet — send the first whisper ✨</div>';
            return;
        }
        
        const messages = snapshot.val();
        const sorted = Object.entries(messages).sort((a,b) => (a[1].time || 0) - (b[1].time || 0));
        
        let html = '';
        for (const [msgId, msg] of sorted) {
            const isOwn = (msg.from === userName);
            const msgTime = msg.time || Date.now();
            const timeStr = formatTime(msgTime);
            const seenStatus = msg.seen === true; // true = already seen by at least one person (other)
            
            // Escape text for XSS safety
            const safeText = (msg.text || '').replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            
            // receipt indicator: for my messages, show double check ✔️ if seen === true else single check (sent)
            let receiptHtml = '';
            if (isOwn) {
                if (seenStatus) {
                    receiptHtml = `<div class="receipt-status"><span class="double-tick">✔️✔️ Seen</span></div>`;
                } else {
                    receiptHtml = `<div class="receipt-status"><span>✔️ Sent</span></div>`;
                }
            }
            
            // different alignment: flex wrapper with right-msg using margin-left auto
            const msgClass = isOwn ? 'right-msg' : 'left-msg';
            // wrapper structure: left/right container
            html += `
                <div class="msg-wrapper" data-msgid="${msgId}" style="justify-content: ${isOwn ? 'flex-end' : 'flex-start'};">
                    <div class="msg ${msgClass}">
                        <div class="msg-header">
                            <span class="sender-name">${escapeHtml(msg.from)}</span>
                            <span class="timestamp">${timeStr}</span>
                        </div>
                        <div class="msg-text">${safeText}</div>
                        ${receiptHtml}
                    </div>
                </div>
            `;
        }
        
        messagesDiv.innerHTML = html;
        // auto-scroll to bottom
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        // after render, mark messages as seen (background)
        setTimeout(() => {
            markMessagesAsSeen();
        }, 300);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // ==========================
    // LISTEN TO REAL-TIME MESSAGES (with onValue for seen toggle)
    // ==========================
    let isFirstLoad = true;
    onValue(messagesRef, (snapshot) => {
        renderMessages(snapshot);
        // after first render also mark unseen messages as seen for others
        if (!isFirstLoad) {
            // additional mark after each update to ensure seen status sync
            setTimeout(() => markMessagesAsSeen(), 200);
        }
        isFirstLoad = false;
    });
    
    // ==========================
    // SEND MESSAGE + with 'seen' default false
    // ==========================
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        // Create new message with seen: false (default)
        const newMsgRef = push(messagesRef);
        const msgPayload = {
            from: userName,
            text: text,
            time: Date.now(),
            seen: false      // unseen by default, will be flipped when other user sees them
        };
        
        await set(newMsgRef, msgPayload);
        messageInput.value = '';
        messageInput.focus();
        
        // scroll after message sent
        setTimeout(() => {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, 50);
    }
    
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // ==========================
    // DELETE ROOM (host / creator only): but anyway confirm and remove
    // ==========================
    const roomRootRef = ref(db, `TalkNest/${roomId}`);
    document.getElementById("deleteRoom").addEventListener("click", async () => {
        const confirmDelete = confirm("⚠️ This will permanently delete the entire room and all messages.\nOnly the host or any participant with caution can delete.\nAre you sure you want to dissolve the nest?");
        if (!confirmDelete) return;
        
        try {
            await remove(roomRootRef);
            localStorage.clear();
            window.location.href = "index.html";
        } catch (err) {
            alert("Error deleting room: " + err.message);
        }
    });
    
    // optional: if the room gets deleted while user active, redirect
    function checkRoomExistsPeriodically() {
        const roomCheck = ref(db, `TalkNest/${roomId}`);
        onValue(roomCheck, (snap) => {
            if (!snap.exists()) {
                alert("Room has been deleted by the host. Redirecting...");
                localStorage.clear();
                window.location.href = "index.html";
            }
        });
    }
    checkRoomExistsPeriodically();
    
    // also trigger seen update on visibility change / when user focuses tab
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
            markMessagesAsSeen();
        }
    });
    
    window.addEventListener("focus", () => {
        markMessagesAsSeen();
    });
    
    // initial mark after load
    setTimeout(() => {
        markMessagesAsSeen();
    }, 800);
    
    // small style adjust: fix right message not aligning: we used justify-content: flex-end wrapper for own msgs, great!
    console.log("TalkNest chat upgraded: timestamps, seen receipts (✔️✔️), right alignment fixed");
</script>
</body>
</html>
